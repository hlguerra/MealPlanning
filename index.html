<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#D4622A" />
  <title>Haley's Meal Planning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#7A6A55;">Loading…</div></div>

  <!-- React & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase via ES module shim -->
  <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
  <script type="importmap">
  {
    "imports": {
      "firebase/app":       "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
    }
  }
  </script>

  <!-- Firebase init -->
  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getFirestore, doc, getDoc, setDoc } from "firebase/firestore";

    const firebaseConfig = {
      apiKey:            "AIzaSyAGsLTqTtqJ_2ofBvzIHZ18rT74Ifj5MTw",
      authDomain:        "meal-planner-5df26.firebaseapp.com",
      projectId:         "meal-planner-5df26",
      storageBucket:     "meal-planner-5df26.firebasestorage.app",
      messagingSenderId: "591027849531",
      appId:             "1:591027849531:web:16799ab95c09098ebf8f1e",
    };

    const fb = initializeApp(firebaseConfig);
    const db = getFirestore(fb);

    const groceryRef = id => doc(db, "households", id, "grocery",  "items");
    const recipesRef = id => doc(db, "households", id, "recipes",  "backup");
    const costlogRef = id => doc(db, "households", id, "costlog",  "entries");
    const hhRef      = id => doc(db, "households", id);

    window.APP = window.APP || {};
    window.APP.firebase = {
      readGrocery:      async id => { const s = await getDoc(groceryRef(id)); return s.exists() ? (s.data().items   || []) : []; },
      readRecipes:      async id => { const s = await getDoc(recipesRef(id)); return s.exists() ? (s.data().recipes || []) : []; },
      readCostLog:      async id => { const s = await getDoc(costlogRef(id)); return s.exists() ? (s.data().entries || []) : []; },
      writeGrocery:     async (id, items)   => setDoc(groceryRef(id), { items,   updatedAt: Date.now() }),
      writeRecipes:     async (id, recipes) => setDoc(recipesRef(id), { recipes, updatedAt: Date.now() }),
      writeCostLog:     async (id, entries) => setDoc(costlogRef(id), { entries, updatedAt: Date.now() }),
      householdExists:  async id => { const s = await getDoc(hhRef(id)); return s.exists(); },
      createHousehold:  async (id, name) => setDoc(hhRef(id), { name, createdAt: Date.now() }),

      readSpending:     async id => { const s = await getDoc(doc(db,"households",id,"spending","history")); return s.exists()?(s.data().entries||[]):[];},
      writeSpending:    async (id,entries) => setDoc(doc(db,"households",id,"spending","history"),{entries,updatedAt:Date.now()}),
      readCookHistory:  async id => { const s = await getDoc(doc(db,"households",id,"cookhistory","log")); return s.exists()?(s.data().entries||[]):[];},
      writeCookHistory: async (id,entries) => setDoc(doc(db,"households",id,"cookhistory","log"),{entries,updatedAt:Date.now()}),
      readMealPlan:     async id => { const s = await getDoc(doc(db,"households",id,"mealplan","current")); return s.exists()?(s.data().items||[]):[];},
      writeMealPlan:    async (id,items) => setDoc(doc(db,"households",id,"mealplan","current"),{items,updatedAt:Date.now()}),
    };
    window.APP.firebaseReady = true;
  </script>

  <!-- App modules in dependency order, all as text/babel -->
  <script type="text/babel" src="js/constants.js"></script>
  <script type="text/babel" src="js/utils.js"></script>
  <script type="text/babel" src="js/categorizer.js"></script>
  <script type="text/babel" src="js/hooks.js"></script>
  <script type="text/babel" src="js/sync.js"></script>
  <script type="text/babel" src="js/components/ui.js"></script>
  <script type="text/babel" src="js/components/nav.js"></script>
  <script type="text/babel" src="js/screens/home.js"></script>
  <script type="text/babel" src="js/screens/recipes.js"></script>
  <script type="text/babel" src="js/screens/mealplan.js"></script>
  <script type="text/babel" src="js/screens/grocery.js"></script>
  <script type="text/babel" src="js/screens/pantry.js"></script>
  <script type="text/babel" src="js/screens/settings.js"></script>
  <script type="text/babel" src="js/app.js"></script>

</body>
</html>
