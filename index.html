<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#D4622A" />
  <title>Haley's Meal Planning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase (loaded as ES modules via a small inline bootstrap) -->
  <script type="module">
    import { initializeApp }      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore,
      doc, getDoc, setDoc,
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ── Config ──────────────────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyAGsLTqTtqJ_2ofBvzIHZ18rT74Ifj5MTw",
      authDomain:        "meal-planner-5df26.firebaseapp.com",
      projectId:         "meal-planner-5df26",
      storageBucket:     "meal-planner-5df26.firebasestorage.app",
      messagingSenderId: "591027849531",
      appId:             "1:591027849531:web:16799ab95c09098ebf8f1e",
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const db          = getFirestore(firebaseApp);

    // ── Path helpers ─────────────────────────────────────────────────────────
    const groceryRef = id => doc(db, "households", id, "grocery",  "items");
    const recipesRef = id => doc(db, "households", id, "recipes",  "backup");
    const costlogRef = id => doc(db, "households", id, "costlog",  "entries");
    const hhRef      = id => doc(db, "households", id);

    // ── Read helpers ─────────────────────────────────────────────────────────
    async function readGrocery(id)  { const s = await getDoc(groceryRef(id)); return s.exists() ? (s.data().items   || []) : []; }
    async function readRecipes(id)  { const s = await getDoc(recipesRef(id)); return s.exists() ? (s.data().recipes || []) : []; }
    async function readCostLog(id)  { const s = await getDoc(costlogRef(id)); return s.exists() ? (s.data().entries || []) : []; }

    // ── Write helpers ────────────────────────────────────────────────────────
    async function writeGrocery(id, items)   { await setDoc(groceryRef(id), { items,   updatedAt: Date.now() }); }
    async function writeRecipes(id, recipes) { await setDoc(recipesRef(id), { recipes, updatedAt: Date.now() }); }
    async function writeCostLog(id, entries) { await setDoc(costlogRef(id), { entries, updatedAt: Date.now() }); }

    // ── Household helpers ────────────────────────────────────────────────────
    async function householdExists(id)       { const s = await getDoc(hhRef(id)); return s.exists(); }
    async function createHousehold(id, name) { await setDoc(hhRef(id), { name, createdAt: Date.now() }); }

    // ── Expose on window.APP ─────────────────────────────────────────────────
    window.APP = window.APP || {};
    window.APP.firebase = {
      readGrocery, readRecipes, readCostLog,
      writeGrocery, writeRecipes, writeCostLog,
      householdExists, createHousehold,
    };

    // Signal that Firebase is ready
    window.APP.firebaseReady = true;
    document.dispatchEvent(new Event("firebase-ready"));
  </script>

  <!-- App modules — loaded after Firebase signals ready -->
  <script>
    // Wait for Firebase to initialise before loading Babel/React modules.
    // Falls back gracefully if Firebase takes longer than expected.
    function loadApp() {
      const scripts = [
        "js/constants.js",
        "js/utils.js",
        "js/categorizer.js",
        "js/hooks.js",
        "js/sync.js",
        "js/components/ui.js",
        "js/components/nav.js",
        "js/screens/home.js",
        "js/screens/recipes.js",
        "js/screens/mealplan.js",
        "js/screens/grocery.js",
        "js/screens/pantry.js",
        "js/screens/settings.js",
        "js/app.js",
      ];

      // Load scripts sequentially so dependencies are met in order
      scripts.reduce((chain, src) => {
        return chain.then(() => new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.type    = "text/babel";
          s.src     = src;
          s.onload  = resolve;
          s.onerror = () => { console.error("Failed to load:", src); reject(); };
          document.body.appendChild(s);
        }));
      }, Promise.resolve())
      .then(() => Babel.transformScriptTags())
      .catch(e => console.error("App load error:", e));
    }

    if (window.APP && window.APP.firebaseReady) {
      loadApp();
    } else {
      document.addEventListener("firebase-ready", loadApp, { once: true });
      // Safety fallback — load app after 3s even if Firebase event didn't fire
      setTimeout(loadApp, 3000);
    }
  </script>

</body>
</html>
