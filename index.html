<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#D4622A" />
  <title>Haley's Meal Planning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <!-- React & Babel (swap for a build tool in production) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- App modules loaded in dependency order -->
  <script type="text/babel" data-type="module" src="js/constants.js"></script>
  <script type="text/babel" data-type="module" src="js/utils.js"></script>
  <script type="text/babel" data-type="module" src="js/categorizer.js"></script>
  <script type="text/babel" data-type="module" src="js/hooks.js"></script>
  <script type="text/babel" data-type="module" src="js/components/ui.js"></script>
  <script type="text/babel" data-type="module" src="js/components/nav.js"></script>
  <script type="text/babel" data-type="module" src="js/screens/home.js"></script>
  <script type="text/babel" data-type="module" src="js/screens/recipes.js"></script>
  <script type="text/babel" data-type="module" src="js/screens/mealplan.js"></script>
  <script type="text/babel" data-type="module" src="js/screens/grocery.js"></script>
  <script type="text/babel" data-type="module" src="js/screens/pantry.js"></script>
  <script type="text/babel" data-type="module" src="js/screens/settings.js"></script>
  <script type="text/babel" data-type="module" src="js/app.js"></script>
</body>
</html>
